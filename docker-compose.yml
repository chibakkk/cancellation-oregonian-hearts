services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:8080
      COH_REDIS_KEY_PREFIX: coh
      COH_ROOM_TTL_MS: 86400000
      COH_ROOM_CLEANUP_INTERVAL_MS: 3600000
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
      args:
        VITE_SERVER_URL: http://localhost:3001
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  redis-data:
